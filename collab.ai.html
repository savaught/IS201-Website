<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Guessing Game </title>

<style>
body {
    font-family: Arial, sans-serif;
    background: grey;
    text-align: center;
    color:black;
    padding: 50px;
}

.container {
    background:white;
    padding: 30px;
    border-radius: 15px;
    max-width: 400px;
    margin: auto;
}

h1 {
    margin-bottom: 10px;
}

input {
    padding: 10px;
    width: 60%;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background-color: lightpink;
    font-weight: bold;
}

button:hover {
    background-color: lightpink;
}

#result {
    margin-top: 15px;
    font-size: 18px;
}

#score {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Guess the Number</h1>
   

    <p id="rangeText">Guess a number between 1 and 10</p>

    <input type="number" id="guessInput" placeholder="Enter guess">
    <br>
    <button onclick="checkGuess()">Submit Guess</button>
    <button onclick="resetGame()">Play Again 🔄</button>

    <p id="result"></p>
    <p id="attempts"></p>
    <p id="score">Score: 0</p>
</div>

<script>
let maxNumber = 10;
let randomNumber = Math.floor(Math.random() * maxNumber) + 1;
let tries = 0;
let score = 0;

function setDifficulty() {
    maxNumber = document.getElementById("difficulty").value;
    document.getElementById("rangeText").innerText = 
        "Guess a number between 1 and " + maxNumber;
    resetGame();
}

function checkGuess() {
    let userGuess = document.getElementById("guessInput").value;
    tries++;

    if (userGuess == randomNumber) {
        document.getElementById("result").innerHTML = "🎉 Correct!";
        score += Math.max(10 - tries, 1);
        document.getElementById("score").innerHTML = "Score: " + score;
    } else if (userGuess < randomNumber) {
        document.getElementById("result").innerHTML = "📉 Too low!";
    } else {
        document.getElementById("result").innerHTML = "📈 Too high!";
    }

    document.getElementById("attempts").innerHTML = "Attempts: " + tries;
}

function resetGame() {
    randomNumber = Math.floor(Math.random() * maxNumber) + 1;
    tries = 0;
    document.getElementById("result").innerHTML = "";
    document.getElementById("attempts").innerHTML = "";
    document.getElementById("guessInput").value = "";
}
</script>

</body>
</html>
