<!DOCTYPE html>
<html lang="en">


<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Disney Trivia</title>
   <style>
  


       * {
           box-sizing: border-box;
           margin: 0;
           padding: 0;
       }


       body {
           font-family: 'Georgia', serif;
           background: lightblue;
           min-height: 100vh;
           display: flex;
           align-items: center;
           justify-content: center;
           padding: 20px;
       }


       .card {
           background: white;
           border-radius: 20px;
           padding: 40px;
           max-width: 600px;
           width: 100%;
           text-align: center;
           box-shadow: 0 8px 32px rgba(0,0,0,0.3);
       }


       h1 {
           font-size: 2.2rem;
           color:darkblue;
           margin-bottom: 6px;
       }


      


       .score-bar {
           display: flex;
           justify-content: space-between;
           font-size: 0.9rem;
           color: #888;
           margin-bottom: 24px;
       }


       .question-num {
           font-size: 0.85rem;
           color: #aaa;
           margin-bottom: 10px;
           text-transform: uppercase;
           letter-spacing: 1px;
       }


       .question {
           font-size: 1.25rem;
           color: #222;
           margin-bottom: 28px;
           line-height: 1.5;
       }


       .options {
           display: grid;
           grid-template-columns: 1fr 1fr;
           gap: 12px;
           margin-bottom: 24px;
       }


       .option-btn {
           background:lightblue;
           border: 2px solid lightblue;
           color: darkblue ;
           border-radius: 12px;
           padding: 14px 10px;
           font-size: 1rem;
           cursor: pointer;
           transition: all 0.2s;
       }


       .option-btn:hover:not(:disabled) {
           background: blue;
           color: white;
           transform: scale(1.03);
       }


       .option-btn.correct {
           background: #bbf7d0;
           border-color: #22c55e;
           color: #14532d;
       }


       .option-btn.wrong {
           background: #fecaca;
           border-color: #ef4444;
           color: #7f1d1d;
       }


       .option-btn:disabled {
           cursor: default;
       }


       .feedback {
           font-size: 1rem;
           min-height: 28px;
           margin-bottom: 16px;
           font-weight: bold;
           color: #6a0dad;
       }


       .next-btn {
           background: #6a0dad;
           color: white;
           border: none;
           border-radius: 12px;
           padding: 12px 32px;
           font-size: 1rem;
           cursor: pointer;
           transition: background 0.2s;
           display: none;
       }


       .next-btn:hover {
           background: #4c0a8a;
       }


       .result-screen {
           display: none;
       }


       .result-screen h2 {
           font-size: 2rem;
           color: #6a0dad;
           margin-bottom: 12px;
       }


       .result-screen .final-score {
           font-size: 3rem;
           font-weight: bold;
           color: #ff69b4;
           margin: 16px 0;
       }


       .result-screen p {
           color: #555;
           font-size: 1.1rem;
           margin-bottom: 24px;
       }


       .restart-btn {
           background: #ff69b4;
           color: white;
           border: none;
           border-radius: 12px;
           padding: 12px 32px;
           font-size: 1rem;
           cursor: pointer;
           transition: background 0.2s;
       }


       .restart-btn:hover {
           background: #e0559f;
       }


       .progress-bar {
           background: #f3e8ff;
           border-radius: 10px;
           height: 8px;
           margin-bottom: 24px;
           overflow: hidden;
       }


       .progress-fill {
           background: darkblue;
           height: 100%;
           border-radius: 10px;
           transition: width 0.4s ease;
       }
   </style>
</head>
<body>


<div class="card">
   <a href="fromScratch.html">Back to Chile Break Page</a>
   <div id="quiz-screen">
       <h1> Disney Trivia </h1>
       <div class="stars"></div>


       <div class="score-bar">
           <span>Score: <strong id="score">0</strong></span>
           <span id="question-counter">Question 1 of 10</span>
       </div>


       <div class="progress-bar">
           <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
       </div>


       <div class="question-num" id="question-num">Question 1</div>
       <div class="question" id="question-text">Loading...</div>


       <div class="options" id="options"></div>


       <div class="feedback" id="feedback"></div>
       <button class="next-btn" id="next-btn">Next ➜</button>
   </div>


   <div class="result-screen" id="result-screen">
       <h2>🎉 Quiz Complete! 🎉</h2>
       <div class="final-score" id="final-score">0/10</div>
       <p id="result-message">Thanks for playing!</p>
       <button class="restart-btn" onclick="restartQuiz()">Play Again ✨</button>
   </div>
</div>


<script>
   const questions = [
       {
           question: "What does Maui's head turn into when speaking to Moana?",
           options: ["Shark", "Whale", "Tiger", "Pig"],
           answer: "Shark"
       },
       {
           question: "Which Disney princess has the ability to heal with her hair?",
           options: ["Cinderella", "Ariel", "Rapunzel", "Aurora"],
           answer: "Rapunzel"
       },
       {
           question: "What is the name of Simba's father in The Lion King?",
           options: ["Scar", "Rafiki", "Mufasa", "Pumba"],
           answer: "Mufasa"
       },
       {
           question: "What does Olaf become in the Summer?",
           options: ["Puddle", "Happy Snowman", "Igloo", "Lake"],
           answer: "Happy Snowman"
       },
       {
           question: "What food is Tiana carrying during the Diner Scene?",
           options: ["Gumbo", "Corn Bread", "Cookies ", "Beignet"],
           answer: "Beignet"
       },
       {
           question: "Which film features the song 'Colors of the Wind'?",
           options: ["Moana", "The Little Mermaid", "Pocahontas", "Brave"],
           answer: "Pocahontas"
       },
       {
           question: "In Descendants who is Evi's Mother?",
           options: ["Maleficent", "Evil Queen", "Cruella de Vil ", "Ursula"],
           answer: "Evil Queen"
       },
       {
           question: "In Finding Nemo, what type of fish is Nemo?",
           options: ["Clownfish", "Blue tang", "Salmon", "Tuna"],
           answer: "Clownfish"
       },
       {
           question: "What is the name of Cinderella's fairy godmother's famous spell?",
           options: ["Abracadabra", "Bibbidi-Bobbidi-Boo", "Hocus Pocus", "Alakazam"],
           answer: "Bibbidi-Bobbidi-Boo"
       },
       {
           question: "Which Disney movie is set in the fictional kingdom of Arendelle?",
           options: ["Tangled", "Brave", "Frozen", "Encanto"],
           answer: "Frozen"
       }
   ];


   let currentQuestion = 0;
   let score = 0;
   let answered = false;


   function loadQuestion() {
       answered = false;
       const q = questions[currentQuestion];
       document.getElementById('question-num').textContent = `Question ${currentQuestion + 1}`;
       document.getElementById('question-counter').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
       document.getElementById('question-text').textContent = q.question;
       document.getElementById('feedback').textContent = '';
       document.getElementById('next-btn').style.display = 'none';


       const progress = (currentQuestion / questions.length) * 100;
       document.getElementById('progress-fill').style.width = progress + '%';


       const optionsDiv = document.getElementById('options');
       optionsDiv.innerHTML = '';
       q.options.forEach(option => {
           const btn = document.createElement('button');
           btn.className = 'option-btn';
           btn.textContent = option;
           btn.onclick = () => selectAnswer(btn, option);
           optionsDiv.appendChild(btn);
       });
   }


   function selectAnswer(btn, selected) {
       if (answered) return;
       answered = true;


       const correct = questions[currentQuestion].answer;
       const allBtns = document.querySelectorAll('.option-btn');


       allBtns.forEach(b => {
           b.disabled = true;
           if (b.textContent === correct) b.classList.add('correct');
       });


       if (selected === correct) {
           btn.classList.add('correct');
           document.getElementById('feedback').textContent = '✅ Correct!';
           score++;
           document.getElementById('score').textContent = score;
       } else {
           btn.classList.add('wrong');
           document.getElementById('feedback').textContent = `❌ The answer was: ${correct}`;
       }


       document.getElementById('next-btn').style.display = 'inline-block';
   }


   document.getElementById('next-btn').onclick = function () {
       currentQuestion++;
       if (currentQuestion < questions.length) {
           loadQuestion();
       } else {
           showResult();
       }
   };


   function showResult() {
       document.getElementById('quiz-screen').style.display = 'none';
       const result = document.getElementById('result-screen');
       result.style.display = 'block';
       document.getElementById('final-score').textContent = `${score}/${questions.length}`;


       let message = '';
       if (score === questions.length) message = '🏆 Perfect score! You are a true Disney expert!';
       else if (score >= 7) message = '🌟 Great job! You really know your Disney!';
       else if (score >= 4) message = '👍 Not bad! Time for a Disney movie marathon?';
       else message = '🎬 Keep watching those Disney movies and try again!';


       document.getElementById('result-message').textContent = message;
   }


   function restartQuiz() {
       currentQuestion = 0;
       score = 0;
       document.getElementById('score').textContent = 0;
       document.getElementById('result-screen').style.display = 'none';
       document.getElementById('quiz-screen').style.display = 'block';
       loadQuestion();
   }


   loadQuestion();
</script>
</body>
</html>
